  <!DOCTYPE html>

  <html>
    <head>
      <style>
    .subscribe-button {
      background-color: rgb(200, 0, 0);
      color: white;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      margin-right: 8px;
      transition: opacity 0.1s;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 16px;
      padding-right: 16px;
      vertical-align: top;
    }
    .subscribe-button:hover {
      opacity: 0.8;
    }
    .subscribe-button:active 
    {
      opacity: 0.5;
    }
    .join-button:hover{
      background-color: rgb(41, 118, 211);
      color: white;
    }
    .join-button:active{
      opacity: 0.7;
    }
    .tweet-button:hover{
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }
    .tweet-button:active
    {
      opacity: 0.7;
    }
    .join-button{
      background-color: white;
      color: rgb(41, 118, 211);
      border-color: rgb(41, 118, 211);
      border-style: solid;
      border-width: 1px;
      border-radius: 2px;
      
      cursor: pointer;
      margin-right: 8px;
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: 9px;
      padding-top: 9px;
      transition: background-color 0.15s, color 0.15s;
    }
    .tweet-button{
      background-color: rgb(2, 158, 255);
      color: white;
      height: 36px;
      width: 74px;
      border-radius: 18px;
      cursor: pointer;
      border: none;
      vertical-align: top;

      transition: box-shadow 0.15s;
    }
  </style>
    </head>
  <body>

  <button class ="subscribe-button">
    SUBSCRIBE
  </button>
  <button class = "join-button">
    JOIN
  </button>
  <button class = "tweet-button">
    Tweet
  </button>
  </body>

  </html>
