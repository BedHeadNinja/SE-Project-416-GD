<!DOCTYPE html>
<html>
  <head>
    <title>My Practice</title>
    <style>
      .Youtube-line{
        font-family: Times New Roman;
        font-size: 18px;
        margin-bottom: 20px;
      }
      .js-subButton{
        background-color: rgb(10, 10, 10);
        color: rgb(239, 229, 229);
        border-radius: 50px;
        font-size: 15px;
        font-family: Time New Roman;
        font-weight: bold;
        width: 110px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 40px;
        cursor: pointer;
      }
      .is-subscribed{
        background-color: rgb(240, 240, 240);
        color: black;
      }
      .js-cost{
        height: 34px;
        width: 180px;
        padding-left: 15px;
      }
      .calculator-button{
        background-color: rgb(4, 149, 4);
        color: white;
        font-size: 15px;
        border: none;
        padding: 10px 17px;
        cursor: pointer;
      }

    </style>
  </head>
  <body>
    <p class="Youtube-line">YouTube Subcribe Button</p>

    <button onclick="
      subButton();
    " class="js-subButton">Subscribe
    </button>

    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping</p>
    <p>Orders over $40 = FREE shipping</p>

    <input placeholder="Cost of order" class="js-cost" onkeydown="
      handleKey();
    ">

    <button onclick="
      Calculate();
    " class="calculator-button"> Calculate </button>

    <p class="js-totalCost"></p>
    <p>Rock Paper Scissors Game</p>
    <a href="index.html" target="blank">Click Here</a>
    
    <script>
      function subButton(){
        const buttonElement = document.querySelector('.js-subButton');
        if(buttonElement.innerHTML === 'Subscribe'){
          buttonElement.innerHTML = 'Subscribed';
          buttonElement.classList.add('is-subscribed');
        } else {
          buttonElement.innerHTML = 'Subscribe';
          buttonElement.classList.remove('is-subscribed');
        }
      }
      function Calculate(){
        const inputElement = document.querySelector('.js-cost');
        let cost = Number(inputElement.value);
        if(cost < 40){
          cost = cost + 10;
        }
        document.querySelector('.js-totalCost').innerHTML = `$${cost}`;
      }
      function handleKey(){
        console.log(event.key);
        if(event.key === 'Enter'){
          Calculate();
        }
      }
    </script>
  </body>
</html>
