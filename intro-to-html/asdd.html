<!DOCTYPE html>
<html>
<head>
  <style>
    /* Styling for the table */
    table {
      width: 50%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }

    /* Your existing Modal CSS */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
    }

    .close {
      float: right;
      font-size: 20px;
      cursor: pointer;
    }
  </style>

</head>
<body>

  <h2>Employee Management</h2>
  <button onclick="openForm()">Add New Employee</button>

  <table id="employeeTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>ID</th>
        <th>Role</th>
      </tr>
    </thead>
    <tbody>
      </tbody>
  </table>

  <div id="popupForm" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Add Employee</h2>
      
      <label>Name:</label><br>
      <input type="text" id="name"><br><br>
      
      <label>ID:</label><br>
      <input type="text" id="empId"><br><br>
      
      <label>Role:</label><br>
      <input type="text" id="role"><br><br>
      
      <button onclick="addEmployee()">Submit</button>
    </div>
  </div>
  <script src="asdd.js">
    
  </script>


</body>
</html>
