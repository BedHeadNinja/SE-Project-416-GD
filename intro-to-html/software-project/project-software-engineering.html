<!DOCTYPE html>
<html>

<head>
  <title> Software engineering project </title>
  <style>
    .header {
      font-size: 30px;
      background-color: rgb(48, 48, 164);
      display: flex;
      align-items: center;
    }

    .title {
      display: flex;
      flex: 1;
      margin-left: 10px;
      color: rgb(243, 224, 224);
    }

    .button {
      justify-content: space-between;
      border-color: rgb(48, 48, 164);
    }

    .table {
      font-size: 20px;
      font-family: arial;
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: center;
      border-width: 1px;
      justify-content: space-between;
      margin-left: 30px;
      margin-right: 30px;
    }

    .first-column {
      border-style: solid;
      border-color: gray;
      text-align: center;
    }

    .second-column {
      border-style: solid;
      border-color: gray;
      text-align: center;

    }

    .third-column {
      border: solid;
      border-color: gray;
      text-align: center;
    }

    .dashboard-button,
    .product-button,
    .add-product-button {
      height: 50px;
      background-color: rgb(48, 48, 164);
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: rgb(243, 224, 224);
    }

    .dashboard-button:hover {
      text-decoration: underline;
    }

    .product-button:hover {
      text-decoration: underline;
    }

    .add-product-button:hover {
      text-decoration: underline;
    }

    .total-product-button,
    .total-iteam-button,
    .low-stock-button {
      color: rgb(71, 28, 111);
      font-size: 18px;
      cursor: pointer;
      border: none;
      background-color: white;
      padding-top: 21px;
    }

    .total-product-button:hover {
      text-decoration: underline;
    }

    .total-iteam-button:hover {
      text-decoration: underline;
    }

    .low-stock-button:hover {
      text-decoration: underline;
    }

    .product-list {
      font-size: 20px;
      font-family: arial;
      color: rgb(71, 28, 111);
      padding-top: 20px;
      padding-left: 28px;
      flex: 1;
      width: 100%;
    }

    .button-below {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .product-table{
      width: 100%;
      border-collapse: collapse;
      background: white;
      table-layout: fixed;
    }
    th, td {
      padding: 20px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
    .table-title{
      padding-left: 2px;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="title">
      <p>Store Inventory System</p>
    </div>
    <div class="button">
      <button class="dashboard-button"> Dashboard </button>
      <button class="product-button"> Product</button>
      <button class="add-product-button"> Add Product</button>
    </div>
  </div>
  <div class="table">
    <div class="first-column">
      <button class="total-product-button"> Total Products</button>
      <p> 25</p>
    </div>
    <div class="second-column">
      <button class="total-iteam-button"> Total Iteams in Stock</button>
      <p> 320</p>
    </div>
    <div class="third-column">
      <button class="low-stock-button"> Low Stock</button>
      <p> 3 Procducts</p>
    </div>
  </div>
  <div class="product-list">
    <p>Product List</p>
  </div>
  <table class="product-table">
    <div class="table-title">
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Status</th>
      </tr>
    </div>
    <tr>
      <td >
        <a href="https://www.daskeyboard.com/" target="blank">
          Keyboard
        </a>
      </td>
      <td>$25</td>
      <td>15</td>
      <td class="in-stock">In Stock</td>
    </tr>
    <tr>
      <td>
        <a href="https://www.logitechg.com/en-us/shop/c/gaming-mice" target="blank">
          Mouse
        </a>
      </td>
      <td>$10</td>
      <td>2</td>
      <td class="low-stock">Low Stock</td>
    </tr>
  </table>
</body>

</html>
