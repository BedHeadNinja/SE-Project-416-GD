{% extends "base.html" %}

{% block content %}
    <div class="body-css">
        <div class="body-header">
            <div class="employee">
                <h1 class="page-title" style="font-size:30px;font-weight:500;color: #3b2f2f;">Products</h1>
            </div>
        </div>
        <div class="grid-middle">
            <div class="box">
                <div class="employee-logo">
                    <img src="{{ url_for('static', filename='/image/product.png') }}" alt="Employee Icon" style="width: 35px; height: 35px;">
                </div>
                <div>
                    <p style="font-size: 17px;">Total Products</p>
                    <p><strong>{{ productStats[0] }}</strong></p>
                </div>
            </div>
            <a href="{{ url_for('inventory.low_stock_page') }}" style="text-decoration:none;color:inherit;">
            <div class="box">
                <div class="employee-logo">
                    <img src="{{ url_for('static', filename='/image/low_stock.png') }}" alt="Employee Icon" style="width: 35px; height: 35px;">
                </div>
                <div>
                    <p style="font-size: 17px;">Low Stock</p>
                    <p><strong>{{ productStats[1] }}</strong></p>
                </div>
            </div>
            </a>
            <a href="{{ url_for('inventory.active_orders') }}" style="text-decoration:none;color:inherit;">
            <div class="box">
                <div class="employee-logo">
                    <img src="{{ url_for('static', filename='/image/expiring.png') }}" alt="Employee Icon" style="width: 35px; height: 35px;">
                </div>
                <div>
                    <p style="font-size: 17px;">Active Orders</p>
                    <p><strong>{{ productStats[2] }}</strong></p>
                </div>
            </div>
            </a>
        </div>
        <br>
        {% block inventory_buttons %}
        {% endblock %}
        <div class="navbar">
        <input type="text" id="search" onkeyup="tableSearch()" placeholder="Search Products">
        </div>
        {% block table %}
        {% endblock %}
    </div>
    <script src="{{ url_for('static', filename='jsFile/inventory.js') }}"></script>
{% endblock %}
