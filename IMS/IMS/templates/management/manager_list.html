{% extends "base.html" %}

{% block content %}
<div class="body-css">
    <div class="body-header">
        <div class="employee">
            <div style="display:flex;align-items:center;">
                <a href="{{ url_for('management.employee_info') }}" style="position:absolute;left:40px;text-decoration:none;color:#3b2f2f;font-size:28px;">&#8592;</a>
                <h1 class="page-title" style="font-size:30px;font-weight:500;color: #3b2f2f;">Manager List</h1>
            </div>
        </div>
    </div>
</div>
<div class="tableCSS">
    <table>
        <thead>
            <tr>
                <th>Manager ID</th>
                <th>Manager Name</th>
            </tr>
        </thead>
        <tbody>
            {% if managers %}
                {% for manager in managers %}
                <tr>
                    <td>{{ manager.id }}</td>
                    <td>{{ manager.name }}</td>
                </tr>
                {% endfor %}
            {% else %}
                <tr><td colspan="3" style="text-align:center;">No Managers Found</td></tr>
            {% endif %}
        </tbody>
    </table>
</div>
{% endblock %}
