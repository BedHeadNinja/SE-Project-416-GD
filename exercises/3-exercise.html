<!DOCTYPE html>
<html>
  <head>
    <title>exercise-3</title>
  </head>
  <body>
    <script>
      let array1 = [];

      function findMinMax(arr){
        let min = arr[0];
        let max = arr[0];
        for(let i=0; i < arr.length; i++){
          if(arr[i] < min){
            min = arr[i];
          }
          if(arr[i] > max){
            max = arr[i];
          }
          if(arr.length === 0){
            console.log('min: ', null);
            console.log('max: ', null);
            return;
          }
        }
        console.log('min: ',min);
        console.log('max: ',max);
      }
      findMinMax(array1);
    </script>
  </body>
</html>
