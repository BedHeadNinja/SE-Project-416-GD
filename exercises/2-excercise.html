  <body>
    <script>
      function addArray(){
        let Array1 = [1,1,2];
        let Array2 = [1,2,3];
        console.log(Array1);
        console.log(Array2);
        let newArray = [];
        for(let i = 0; i < Array1.length; i++){
          let number = Array1[i] + Array2[i];
          newArray.push(number);
        }
        console.log(newArray);
      }
      addArray();
    </script>
  </body>
