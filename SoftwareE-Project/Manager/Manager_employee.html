<!DOCTYPE html>
<html>

<head>
  <title>Manager_Employee</title>
  <link rel="stylesheet" href="../cssFile/UI.css">
  <link rel="stylesheet" href="../cssFile/header.css">
  <link rel="stylesheet" href="../cssFile/addTable.css">
  <link rel="stylesheet" href="../cssFile/E-P_Button.css">
</head>

<body>
  <div class="header">
    <div class="left-section">
      <img style="margin-left: 50px; width: 200px; height: 79px; background-color: transparent;" src="../image/company-logo.png">
    </div>
    <div class="right-section">
      <button class="hamburger" onclick="toggleMenu()">☰</button>
      <div class="E_P_Button" id="EPButton">
        <a class="product-link" href="Manager_product.html">Product</a>
        <a class="product-link" href="Manager_employee.html">Employee</a>
        <button class="login-button">Login</button>
      </div>
    </div>
  </div>
  <div class="body-css">
    <div class="body-header">
      <div class="employee">
        <p style="font-size:13px;margin-bottom:4px;color: #3b2f2f;">Manager Portal</p>
        <h1 class="page-title" style="font-size:24px;font-weight:500;color: #3b2f2f;">Employee Management</h1>
      </div>

      <button class="addButton js-addButton" onclick="openaddElement()">+ Add Employee</button>
    </div>
    <div class="grid-middle">
      <div class="box">
        <div class="employee-logo">
          <img src="/image/employee.png" alt="Employee Icon" style="width: 35px; height: 35px;">
        </div>
        <div>
          <p style="font-size: 17px;">Total Employees</p>
          <p><strong>1</strong></p>
        </div>
      </div>
      <div class="box">
        <div class="employee-logo">
          <img src="/image/ticked.png" alt="Employee Icon" style="width: 35px; height: 35px;">
        </div>
        <div>
          <p style="font-size: 17px;">Team Employee</p>
          <p><strong>1</strong></p>
        </div>
      </div>
      <div class="box">
        <div class="employee-logo">
          <img src="/image/unchecked.png" alt="Employee Icon" style="width: 35px; height: 35px;">
        </div>
        <div>
          <p style="font-size: 17px;">Manager</p>
          <p><strong>0</strong></p>
        </div>
      </div>
    </div>
    <div class="tableCSS">
      <table>
        <thead>
          <tr>
            <th>Employee Name</th>
            <th>ID</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>abc</td>
            <td>abc</td>
            <td>abc</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="addElementForm" id="form">
      <h2>Add Employee</h2>
      <button class="x-button" onclick="closeForm()">x</button>

      </button>
      <label>Name:</label><br>
      <input type="text" id="name"><br><br>

      <label>ID:</label><br>
      <input type="text" id="id"><br><br>

      <label>Role:</label><br>
      <input type="text" id="role"><br><br>
      <button onclick="addEmployee()">Submit</button>
    </div>
  </div>
  <script src="../jsFile/manager_employee.js"> </script>
  <script src="../jsFile/E-P-Button.js"> </script>
</body>

</html>
