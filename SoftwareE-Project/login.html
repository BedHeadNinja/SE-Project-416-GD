<!DOCTYPE html>
<html>
  <head>
    <title>EmployeeID</title>
    <style>
      .body-class{
        display: flex;
        justify-content: center;   
        align-items: center;  
        flex-direction: column;    
        height: 50vh;             
        margin: 0;
        padding-bottom: 20px;
      }
      .login-claas{
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .Enter-button{
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .employeeID{
        font-size: 28px;
        margin-left: 3px;
      }
      .login-outline{
        border: 2px solid black;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        height: 40px;
        font-size: 20px;
      }
      .placeholder{
        color: black;
        font-size: 23.8px;
        padding-top: 4px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .Enter-button{
        margin-top: 10px;
      }
      .enter{
        font-size: 15px;
        padding: 7px 14px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .logo{
        font-size: 23px;
        font-weight: bold;
        color: white;
        background-color: transparent;
        border: none;
        cursor: pointer;
        height: 60px;
        padding-left: 20px;
        padding-right: 20px;
      }
      .logo:hover {
        border: 1px solid;
        border-color: rgb(233, 195, 195);
        border-width: 2px;
        border-radius: 5px;
      }
    </style>
    <link rel="stylesheet" href="cssFile/UI.css">
  </head>
  <body>
    <div class="header">
      <div class="left-section">
        <button class="logo" onclick="location.reload()">
          Name-Company
        </button>
      </div>
        <div class="right-section">
        <button class="cart-button">Something</button>
      </div>
    </div>
    <div class="body-class">
      <div>
        <h1 class="employeeID">Employee ID</h1>
      </div>
      <div class="login-class">
        <form class= "login-outline">
          <label for="employeeID"></label>
          <input class="placeholder" type="text" id="employeeID" name="employeeID" required>
          <br><br>
          <div class="Enter-button">
           <input class="enter" type="submit" value="Enter">
          </div>
        </form>
      </div>
      </div>
    </div>
  </body>
</html>
